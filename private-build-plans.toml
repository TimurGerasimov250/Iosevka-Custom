[buildPlans.IosevieCustom]
family = "Iosevie Custom"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
noLigation = true

  [buildPlans.IosevieCustom.variants]
  inherits = "ss04"

    [buildPlans.IosevieCustom.variants.design]
    capital-m = "hanging-serifless"
    capital-q = "curly-tailed"
    capital-w = "straight-serifless"
    f = "flat-hook-serifed-crossbar-at-x-height"
    g = "single-storey-serifless"
    r = "serifed"
    w = "straight-serifless"
    y = "straight-serifless"
    long-s = "flat-hook-double-serifed-xh"
    eszet = "longs-s-lig-middle-serifed-xh"
    lower-gamma = "casual"
    lower-upsilon = "casual-serifless"
    lower-chi = "straight-serifless"
    cyrl-capital-zhe = "symmetric-connected"
    cyrl-zhe = "symmetric-connected"
    cyrl-capital-ka = "symmetric-connected-serifless"
    cyrl-ka = "symmetric-connected-serifless"
    cyrl-em = "flat-bottom-serifless"
    cyrl-u = "straight-serifless"
    tittle = "round"
    diacritic-dot = "round"
    punctuation-dot = "round"
    braille-dot = "round"
    ampersand = "closed"
    at = "fourfold"
    bar = "natural-slope"
    micro-sign = "toothed-serifless"

[buildPlans.IosevieCustom.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.IosevieCustom.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevieCustom.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
